<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpendWise - Login</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Wahi consistent styling jo signup page par hai */
        .auth-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }
        .auth-container {
            width: 100%;
            max-width: 400px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 198, 255, 0.2);
        }
        .auth-input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            border-radius: 8px;
            outline: none;
            box-sizing: border-box;
        }
        .auth-input:focus {
            border-color: #00c6ff;
            box-shadow: 0 0 8px rgba(0, 198, 255, 0.3);
        }
        .auth-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 0 10px rgba(0, 198, 255, 0.4);
            font-size: 16px;
        }
        .auth-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-container">
            <h2 style="color: #00c6ff; margin-bottom: 10px;">Welcome Back! 🔑</h2>
            <p style="color: #aaa; font-size: 14px; margin-bottom: 25px;">Log in to access your personal dashboard</p>
            
            <form action="loginUser" method="POST">
                <input type="email" name="userEmail" class="auth-input" placeholder="Registered Email" required>
                <input type="password" name="userPassword" class="auth-input" placeholder="Password" required>
                <button type="submit" class="auth-btn">Secure Login</button>
            </form>
            
            <p style="margin-top: 20px; font-size: 14px; color: #aaa;">
                New to SpendWise? <a href="signup.html" style="color: #00c6ff; text-decoration: none; font-weight: bold;">Create an account</a>
            </p>
            <!-- Yeh login.html mein Secure Login button ke neeche add karo -->
<p style="margin-top: 15px; font-size: 14px; color: #aaa;">
    Forgot your password? 
    <a href="forgot-password.html" 
       style="color: #00c6ff; 
              text-decoration: none; 
              font-weight: bold;">
        Reset here
    </a>
</p>
        </div>
    </div>
</body>
</html>
