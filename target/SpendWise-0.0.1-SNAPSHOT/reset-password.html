<!DOCTYPE html>
<html>
<head>
    <!-- Yeh line emoji fix karegi -->
    <meta charset="UTF-8">
    <title>SpendWise - Reset Password</title>
    <style>
        /* Dark theme background */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a1a, #0d1b2a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Main container box */
        .container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 198, 255, 0.3);
            border-radius: 20px;
            padding: 45px 40px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 198, 255, 0.1);
        }

        /* Lock icon circle */
        .icon-circle {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 35px;
        }

        /* Heading */
        h2 {
            color: #00c6ff;
            font-size: 24px;
            margin-bottom: 8px;
        }

        /* Subtitle */
        .subtitle {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        /* Input label */
        .input-group {
            text-align: left;
            margin-bottom: 15px;
        }

        .input-group label {
            color: #00c6ff;
            font-size: 12px;
            font-weight: bold;
            display: block;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        /* Input boxes */
        .input-group input {
            width: 100%;
            padding: 13px 15px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(0, 198, 255, 0.3);
            color: #fff;
            border-radius: 10px;
            font-size: 14px;
            transition: border 0.3s;
        }

        /* Input focus effect */
        .input-group input:focus {
            outline: none;
            border-color: #00c6ff;
            box-shadow: 0 0 10px rgba(0, 198, 255, 0.2);
        }

        /* Password strength bar */
        .strength-bar {
            height: 4px;
            border-radius: 2px;
            background: #333;
            margin-top: 8px;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            border-radius: 2px;
            transition: all 0.3s;
        }

        .strength-text {
            font-size: 11px;
            margin-top: 4px;
            text-align: right;
        }

        /* Reset button */
        .reset-btn {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .reset-btn:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        /* Back to login link */
        .back-link {
            margin-top: 20px;
            color: #aaa;
            font-size: 13px;
        }

        .back-link a {
            color: #00c6ff;
            text-decoration: none;
            font-weight: bold;
        }

        /* Password rules */
        .rules {
            background: rgba(0, 198, 255, 0.05);
            border: 1px solid rgba(0, 198, 255, 0.1);
            border-radius: 8px;
            padding: 12px 15px;
            margin-bottom: 20px;
            text-align: left;
        }

        .rules p {
            color: #aaa;
            font-size: 12px;
            margin: 3px 0;
        }

        /* Tick marks for rules */
        .rule-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #666;
            font-size: 12px;
            margin: 4px 0;
            transition: color 0.3s;
        }

        .rule-item.valid {
            color: #00c6ff;
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- Lock icon circle -->
        <div class="icon-circle">🔑</div>

        <!-- Heading -->
        <h2>Reset Password</h2>
        <p class="subtitle">
            Create a strong new password<br>
            for your SpendWise account
        </p>

        <!-- Password rules box -->
        <div class="rules">
            <div class="rule-item" id="rule-length">
                ○ Minimum 8 characters
            </div>
            <div class="rule-item" id="rule-upper">
                ○ At least one uppercase letter
            </div>
            <div class="rule-item" id="rule-number">
                ○ At least one number
            </div>
        </div>

        <!-- Form -->
        <form action="resetPassword" method="POST">

            <!-- New Password -->
            <div class="input-group">
                <label>NEW PASSWORD</label>
                <input type="password"
                       name="newPassword"
                       id="newPassword"
                       placeholder="Enter new password"
                       required
                       oninput="checkStrength(this.value)">
                <!-- Password strength bar -->
                <div class="strength-bar">
                    <div class="strength-fill" id="strengthFill"></div>
                </div>
                <div class="strength-text" id="strengthText"></div>
            </div>

            <!-- Confirm Password -->
            <div class="input-group">
                <label>CONFIRM PASSWORD</label>
                <input type="password"
                       name="confirmPassword"
                       id="confirmPassword"
                       placeholder="Confirm new password"
                       required
                       oninput="checkMatch()">
                <!-- Match indicator -->
                <div class="strength-text" 
                     id="matchText"></div>
            </div>

            <!-- Reset Button -->
            <button type="submit" class="reset-btn">
                🔐 Reset Password
            </button>

        </form>

        <!-- Back to login -->
        <div class="back-link">
            <p>Remember password? 
                <a href="login.html">Login here</a>
            </p>
        </div>

    </div>

    <script>
        // Password strength checker
        function checkStrength(password) {
            let strength = 0;
            let fill = document.getElementById('strengthFill');
            let text = document.getElementById('strengthText');

            // Rule checks
            let ruleLength = document.getElementById('rule-length');
            let ruleUpper = document.getElementById('rule-upper');
            let ruleNumber = document.getElementById('rule-number');

            // Check minimum 8 characters
            if (password.length >= 8) {
                strength++;
                ruleLength.className = 'rule-item valid';
                ruleLength.innerHTML = '✓ Minimum 8 characters';
            } else {
                ruleLength.className = 'rule-item';
                ruleLength.innerHTML = '○ Minimum 8 characters';
            }

            // Check uppercase
            if (/[A-Z]/.test(password)) {
                strength++;
                ruleUpper.className = 'rule-item valid';
                ruleUpper.innerHTML = '✓ At least one uppercase letter';
            } else {
                ruleUpper.className = 'rule-item';
                ruleUpper.innerHTML = '○ At least one uppercase letter';
            }

            // Check number
            if (/[0-9]/.test(password)) {
                strength++;
                ruleNumber.className = 'rule-item valid';
                ruleNumber.innerHTML = '✓ At least one number';
            } else {
                ruleNumber.className = 'rule-item';
                ruleNumber.innerHTML = '○ At least one number';
            }

            // Update strength bar
            if (strength === 1) {
                fill.style.width = '33%';
                fill.style.background = '#ff4444';
                text.style.color = '#ff4444';
                text.innerHTML = 'Weak';
            } else if (strength === 2) {
                fill.style.width = '66%';
                fill.style.background = '#ffaa00';
                text.style.color = '#ffaa00';
                text.innerHTML = 'Medium';
            } else if (strength === 3) {
                fill.style.width = '100%';
                fill.style.background = '#00c6ff';
                text.style.color = '#00c6ff';
                text.innerHTML = 'Strong ✓';
            } else {
                fill.style.width = '0%';
                text.innerHTML = '';
            }
        }

        // Password match checker
        function checkMatch() {
            let pass = document.getElementById('newPassword').value;
            let confirm = document.getElementById('confirmPassword').value;
            let matchText = document.getElementById('matchText');

            if (confirm.length > 0) {
                if (pass === confirm) {
                    matchText.style.color = '#00c6ff';
                    matchText.innerHTML = '✓ Passwords match!';
                } else {
                    matchText.style.color = '#ff4444';
                    matchText.innerHTML = '✗ Passwords do not match!';
                }
            }
        }
    </script>
</body>
</html>
