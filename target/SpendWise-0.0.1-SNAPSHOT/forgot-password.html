<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
    <title>SpendWise - Forgot Password</title>
    <style>
        /* Page ka background dark rakha hai 
           SpendWise ke theme se match karne ke liye */
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0a0a1a, #0d1b2a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        /* Box jo center mein dikhega */
        .container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 198, 255, 0.2);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        /* SpendWise heading */
        h2 {
            color: #00c6ff;
            margin-bottom: 10px;
        }

        /* Chhoti description */
        p {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 25px;
        }

        /* Email input box */
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
        }

        /* Send OTP button */
        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        /* Back to login link */
        a {
            color: #00c6ff;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔐 Forgot Password?</h2>
        <p>Enter your registered email — we'll send you an OTP!</p>

        <!-- Form jo ForgotPasswordServlet pe jayega -->
        <form action="forgotPassword" method="POST">

            <!-- User apni email dalta hai yahan -->
            <input type="email" 
                   name="userEmail" 
                   placeholder="Enter your registered email" 
                   required>

            <!-- Button click karne pe OTP email pe jayega -->
            <button type="submit">Send OTP 📧</button>

        </form>

        <!-- Agar yaad aa gaya password toh wapas login pe -->
        <p style="margin-top: 20px;">
            Remember password? 
            <a href="login.html">Login here</a>
        </p>
    </div>
</body>
</html>
