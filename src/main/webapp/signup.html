<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpendWise - Create Account</title>
    <link rel="stylesheet" href="style.css"> <style>
        /* Login/Signup layout ko screen ke beech mein center karne ke liye extra style */
        .auth-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }
        .auth-container {
            width: 100%;
            max-width: 400px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 198, 255, 0.2);
        }
        .auth-input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            border-radius: 8px;
            outline: none;
            box-sizing: border-box;
        }
        .auth-input:focus {
            border-color: #00c6ff;
            box-shadow: 0 0 8px rgba(0, 198, 255, 0.3);
        }
        .auth-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 0 10px rgba(0, 198, 255, 0.4);
            font-size: 16px;
        }
        .auth-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-container">
            <h2 style="color: #00c6ff; margin-bottom: 10px;">SpendWise 🚀</h2>
            <p style="color: #aaa; font-size: 14px; margin-bottom: 25px;">Create a new account to manage your budget</p>
            
            <form action="registerUser" method="POST">
                <input type="text" name="fullName" class="auth-input" placeholder="Full Name" required>
                <input type="email" name="userEmail" class="auth-input" placeholder="Email Address" required>
                <input type="password" name="userPassword" class="auth-input" placeholder="Create Password" required>
                <button type="submit" class="auth-btn">Sign Up</button>
            </form>
            
            <p style="margin-top: 20px; font-size: 14px; color: #aaa;">
                Already have an account? <a href="login.html" style="color: #00c6ff; text-decoration: none; font-weight: bold;">Login here</a>
            </p>
        </div>
    </div>
</body>
</html>
