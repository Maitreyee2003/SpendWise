<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpendWise - Forgot Password</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0a0a1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(0,198,255,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(0,114,255,0.08) 0%, transparent 50%);
            animation: bgMove 8s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes bgMove {
            0% { transform: translate(0,0); }
            100% { transform: translate(-30px,-20px); }
        }

        /* Particles */
        .particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 3px; height: 3px;
            background: rgba(0,198,255,0.4);
            border-radius: 50%;
            animation: float linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }

        .wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }

        /* Logo */
        .logo-area {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo-icon {
            width: 65px; height: 65px;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin-bottom: 10px;
            box-shadow: 0 10px 30px rgba(0,198,255,0.3);
            animation: logoFloat 3s ease-in-out infinite;
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        .logo-name {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }

        /* Card */
        .card {
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0,198,255,0.15);
            border-radius: 24px;
            padding: 40px 36px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        /* Step indicator */
        .steps {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            gap: 8px;
        }

        .step {
            width: 32px; height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
        }

        .step.active {
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            color: white;
            box-shadow: 0 4px 12px rgba(0,198,255,0.4);
        }

        .step.inactive {
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.3);
        }

        .step-line {
            flex: 1;
            height: 2px;
            background: rgba(255,255,255,0.08);
            max-width: 40px;
        }

        .step-line.active {
            background: linear-gradient(90deg, #00c6ff, #0072ff);
        }

        /* Icon circle */
        .icon-circle {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, 
                rgba(0,198,255,0.15), 
                rgba(0,114,255,0.15));
            border: 2px solid rgba(0,198,255,0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin: 0 auto 20px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0,198,255,0.3); }
            50% { box-shadow: 0 0 0 12px rgba(0,198,255,0); }
        }

        .card-title {
            color: #ffffff;
            font-size: 22px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
        }

        .card-subtitle {
            color: rgba(255,255,255,0.4);
            font-size: 13px;
            text-align: center;
            margin-bottom: 28px;
            line-height: 1.6;
        }

        /* Input */
        .input-group { margin-bottom: 16px; }

        .input-label {
            display: block;
            color: rgba(0,198,255,0.8);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .input-wrapper { position: relative; }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            opacity: 0.5;
        }

        .auth-input {
            width: 100%;
            padding: 13px 14px 13px 42px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            color: #ffffff;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s;
            outline: none;
        }

        .auth-input::placeholder { color: rgba(255,255,255,0.25); }

        .auth-input:focus {
            border-color: rgba(0,198,255,0.5);
            background: rgba(0,198,255,0.08);
            box-shadow: 0 0 0 3px rgba(0,198,255,0.1);
        }

        /* Button */
        .submit-btn {
            width: 100%;
            padding: 14px;
            margin-top: 8px;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            border: none;
            color: white;
            font-weight: 700;
            font-size: 15px;
            border-radius: 12px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .submit-btn:hover::before { left: 100%; }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,114,255,0.4);
        }

        /* Info box */
        .info-box {
            background: rgba(0,198,255,0.05);
            border: 1px solid rgba(0,198,255,0.15);
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .info-box span:first-child { font-size: 18px; }

        .info-box p {
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            line-height: 1.6;
        }

        /* Back link */
        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }

        .back-link a:hover { color: #00c6ff; }
    </style>
</head>
<body>

    <div class="particles" id="particles"></div>

    <div class="wrapper">

        <!-- Logo -->
        <div class="logo-area">
            <div class="logo-icon">💰</div>
            <div class="logo-name">SPENDWISE</div>
        </div>

        <div class="card">

            <!-- Step Indicator -->
            <div class="steps">
                <div class="step active">1</div>
                <div class="step-line active"></div>
                <div class="step inactive">2</div>
                <div class="step-line"></div>
                <div class="step inactive">3</div>
            </div>

            <!-- Icon -->
            <div class="icon-circle">🔐</div>

            <h2 class="card-title">Forgot Password?</h2>
            <p class="card-subtitle">
                No worries! Enter your registered email<br>
                and we'll send you a reset OTP.
            </p>

            <!-- Info Box -->
            <div class="info-box">
                <span>💡</span>
                <p>A 6-digit OTP will be sent to your email. 
                   It will be valid for <strong 
                   style="color:#00c6ff;">10 minutes only.</strong></p>
            </div>

            <form action="forgotPassword" method="POST">
                <div class="input-group">
                    <label class="input-label">Registered Email</label>
                    <div class="input-wrapper">
                        <span class="input-icon">📧</span>
                        <input type="email"
                               name="userEmail"
                               class="auth-input"
                               placeholder="Enter your registered email"
                               required>
                    </div>
                </div>

                <button type="submit" class="submit-btn">
                    📧 Send OTP
                </button>
            </form>

            <div class="back-link">
                <a href="login.html">← Back to Login</a>
            </div>

        </div>
    </div>

    <script>
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 40; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                const size = Math.random() * 3 + 1;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.animationDuration = (Math.random() * 15 + 10) + 's';
                p.style.animationDelay = (Math.random() * 15) + 's';
                container.appendChild(p);
            }
        }
        createParticles();
    </script>

</body>
</html>
