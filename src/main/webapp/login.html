<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpendWise - Login</title>
    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Animated background */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0a0a1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated gradient background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 20% 50%, 
                rgba(0, 198, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, 
                rgba(0, 114, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, 
                rgba(120, 0, 255, 0.05) 0%, transparent 50%);
            animation: bgMove 8s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes bgMove {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(-30px, -20px) rotate(3deg); }
        }

        /* Floating particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(0, 198, 255, 0.4);
            border-radius: 50%;
            animation: float linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100px) rotate(720deg); opacity: 0; }
        }

        /* Main container */
        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }

        /* Logo area */
        .logo-area {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin-bottom: 12px;
            box-shadow: 0 10px 30px rgba(0, 198, 255, 0.3);
            animation: logoFloat 3s ease-in-out infinite;
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        .logo-name {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }

        .logo-tagline {
            color: rgba(255,255,255,0.4);
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 4px;
        }

        /* Login card */
        .login-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 198, 255, 0.15);
            border-radius: 24px;
            padding: 40px 36px;
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255,255,255,0.05),
                inset 0 1px 0 rgba(255,255,255,0.1);
        }

        /* Card heading */
        .card-title {
            color: #ffffff;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .card-subtitle {
            color: rgba(255,255,255,0.4);
            font-size: 14px;
            margin-bottom: 28px;
        }

        /* Input groups */
        .input-group {
            margin-bottom: 16px;
        }

        .input-label {
            display: block;
            color: rgba(0, 198, 255, 0.8);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            opacity: 0.5;
        }

        .auth-input {
            width: 100%;
            padding: 13px 14px 13px 42px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s ease;
            outline: none;
        }

        .auth-input::placeholder {
            color: rgba(255,255,255,0.25);
        }

        .auth-input:focus {
            border-color: rgba(0, 198, 255, 0.5);
            background: rgba(0, 198, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(0, 198, 255, 0.1);
        }

        /* Login button */
        .login-btn {
            width: 100%;
            padding: 14px;
            margin-top: 8px;
            background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
            border: none;
            color: white;
            font-weight: 700;
            font-size: 15px;
            border-radius: 12px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255,255,255,0.2), 
                transparent);
            transition: left 0.5s ease;
        }

        .login-btn:hover::before {
            left: 100%;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 114, 255, 0.4);
        }

        .login-btn:active {
            transform: translateY(0px);
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            gap: 12px;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.08);
        }

        .divider-text {
            color: rgba(255,255,255,0.25);
            font-size: 12px;
        }

        /* Bottom links */
        .bottom-links {
            text-align: center;
        }

        .bottom-links p {
            color: rgba(255,255,255,0.4);
            font-size: 13px;
            margin: 8px 0;
        }

        .bottom-links a {
            color: #00c6ff;
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .bottom-links a:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        /* Security badge */
        .security-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 24px;
            color: rgba(255,255,255,0.2);
            font-size: 11px;
        }
    </style>
</head>
<body>

    <!-- Floating particles -->
    <div class="particles" id="particles"></div>

    <div class="login-wrapper">

        <!-- Logo -->
        <div class="logo-area">
            <div class="logo-icon">💰</div>
            <div class="logo-name">SPENDWISE</div>
            <div class="logo-tagline">Personal Finance Manager</div>
        </div>

        <!-- Login Card -->
        <div class="login-card">

            <h2 class="card-title">Welcome Back! 👋</h2>
            <p class="card-subtitle">Sign in to your financial dashboard</p>

            <form action="loginUser" method="POST">

                <!-- Email -->
                <div class="input-group">
                    <label class="input-label">Email Address</label>
                    <div class="input-wrapper">
                        <span class="input-icon">📧</span>
                        <input type="email"
                               name="userEmail"
                               class="auth-input"
                               placeholder="Enter your email"
                               required>
                    </div>
                </div>

                <!-- Password -->
                <div class="input-group">
                    <label class="input-label">Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password"
                               name="userPassword"
                               class="auth-input"
                               placeholder="Enter your password"
                               required>
                    </div>
                </div>

                <!-- Login Button -->
                <button type="submit" class="login-btn">
                    🚀 Secure Login
                </button>

            </form>

            <div class="divider">
                <div class="divider-line"></div>
                <span class="divider-text">OR</span>
                <div class="divider-line"></div>
            </div>

            <!-- Bottom Links -->
            <div class="bottom-links">
                <p>New to SpendWise? 
                    <a href="signup.html">Create an account</a>
                </p>
                <p>Forgot your password? 
                    <a href="forgot-password.html">Reset here</a>
                </p>
            </div>

            <!-- Security Badge -->
            <div class="security-badge">
                🔐 Protected with BCrypt Encryption
            </div>

        </div>
    </div>

    <script>
        // Create floating particles
        function createParticles() {
            const container = document.getElementById('particles');
            const count = 40;

            for (let i = 0; i < count; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';

                // Random position
                particle.style.left = Math.random() * 100 + '%';

                // Random size
                const size = Math.random() * 3 + 1;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';

                // Random animation duration
                const duration = Math.random() * 15 + 10;
                particle.style.animationDuration = duration + 's';

                // Random delay
                particle.style.animationDelay = Math.random() * 15 + 's';

                // Random opacity
                particle.style.opacity = Math.random() * 0.5 + 0.1;

                container.appendChild(particle);
            }
        }

        createParticles();
    </script>

</body>
</html>
