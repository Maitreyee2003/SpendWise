<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpendWise - Reset Password</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0a0a1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(0,198,255,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(0,114,255,0.08) 0%, transparent 50%);
            animation: bgMove 8s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes bgMove {
            0% { transform: translate(0,0); }
            100% { transform: translate(-30px,-20px); }
        }

        .particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: rgba(0,198,255,0.4);
            border-radius: 50%;
            animation: float linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }

        .wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo-icon {
            width: 65px; height: 65px;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin-bottom: 10px;
            box-shadow: 0 10px 30px rgba(0,198,255,0.3);
            animation: logoFloat 3s ease-in-out infinite;
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        .logo-name {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }

        .card {
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0,198,255,0.15);
            border-radius: 24px;
            padding: 40px 36px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .steps {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            gap: 8px;
        }

        .step {
            width: 32px; height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
        }

        .step.done {
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            color: white;
        }

        .step.active {
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            color: white;
            box-shadow: 0 4px 12px rgba(0,198,255,0.4);
        }

        .step-line {
            flex: 1;
            height: 2px;
            max-width: 40px;
        }

        .step-line.active {
            background: linear-gradient(90deg, #00c6ff, #0072ff);
        }

        .step-line.inactive {
            background: rgba(255,255,255,0.08);
        }

        .icon-circle {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, rgba(0,198,255,0.15), rgba(0,114,255,0.15));
            border: 2px solid rgba(0,198,255,0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin: 0 auto 20px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0,198,255,0.3); }
            50% { box-shadow: 0 0 0 12px rgba(0,198,255,0); }
        }

        .card-title {
            color: #fff;
            font-size: 22px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
        }

        .card-subtitle {
            color: rgba(255,255,255,0.4);
            font-size: 13px;
            text-align: center;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .input-group { margin-bottom: 16px; }

        .input-label {
            display: block;
            color: rgba(0,198,255,0.8);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .input-wrapper { position: relative; }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            opacity: 0.5;
        }

        .auth-input {
            width: 100%;
            padding: 13px 42px 13px 42px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s;
            outline: none;
        }

        .auth-input::placeholder { color: rgba(255,255,255,0.25); }

        .auth-input:focus {
            border-color: rgba(0,198,255,0.5);
            background: rgba(0,198,255,0.08);
            box-shadow: 0 0 0 3px rgba(0,198,255,0.1);
        }

        /* Show/hide password toggle */
        .toggle-pass {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 16px;
            opacity: 0.5;
            transition: opacity 0.2s;
            background: none;
            border: none;
        }

        .toggle-pass:hover { opacity: 1; }

        /* Password strength */
        .strength-container {
            margin-top: 8px;
        }

        .strength-bar {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 4px;
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            border-radius: 2px;
            transition: all 0.4s ease;
        }

        .strength-text {
            font-size: 11px;
            text-align: right;
        }

        /* Rules */
        .rules {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 20px;
        }

        .rule {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255,255,255,0.3);
            font-size: 12px;
            margin: 5px 0;
            transition: color 0.3s;
        }

        .rule.valid { color: #00c6ff; }
        .rule-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: currentColor;
            flex-shrink: 0;
        }

        /* Match indicator */
        .match-text {
            font-size: 12px;
            margin-top: 6px;
            text-align: right;
            min-height: 16px;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            margin-top: 8px;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            border: none;
            color: white;
            font-weight: 700;
            font-size: 15px;
            border-radius: 12px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .submit-btn:hover::before { left: 100%; }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,114,255,0.4);
        }

        .back-link {
            text-align: center;
            margin-top: 16px;
        }

        .back-link a {
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            font-size: 13px;
            transition: color 0.2s;
        }

        .back-link a:hover { color: #00c6ff; }
    </style>
</head>
<body>

    <div class="particles" id="particles"></div>

    <div class="wrapper">

        <div class="logo-area">
            <div class="logo-icon">💰</div>
            <div class="logo-name">SPENDWISE</div>
        </div>

        <div class="card">

            <div class="steps">
                <div class="step done">✓</div>
                <div class="step-line active"></div>
                <div class="step done">✓</div>
                <div class="step-line active"></div>
                <div class="step active">3</div>
            </div>

            <div class="icon-circle">🔑</div>

            <h2 class="card-title">Create New Password</h2>
            <p class="card-subtitle">
                Choose a strong password<br>
                for your SpendWise account.
            </p>

            <!-- Password Rules -->
            <div class="rules">
                <div class="rule" id="rule-length">
                    <div class="rule-dot"></div>
                    Minimum 8 characters
                </div>
                <div class="rule" id="rule-upper">
                    <div class="rule-dot"></div>
                    At least one uppercase letter
                </div>
                <div class="rule" id="rule-number">
                    <div class="rule-dot"></div>
                    At least one number
                </div>
            </div>

            <form action="resetPassword" method="POST">

                <!-- New Password -->
                <div class="input-group">
                    <label class="input-label">New Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password"
                               name="newPassword"
                               id="newPassword"
                               class="auth-input"
                               placeholder="Create new password"
                               required
                               oninput="checkStrength(this.value)">
                        <button type="button" class="toggle-pass"
                                onclick="togglePass('newPassword', this)">👁️</button>
                    </div>
                    <div class="strength-container">
                        <div class="strength-bar">
                            <div class="strength-fill" id="strengthFill"></div>
                        </div>
                        <div class="strength-text" id="strengthText"></div>
                    </div>
                </div>

                <!-- Confirm Password -->
                <div class="input-group">
                    <label class="input-label">Confirm Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password"
                               name="confirmPassword"
                               id="confirmPassword"
                               class="auth-input"
                               placeholder="Confirm new password"
                               required
                               oninput="checkMatch()">
                        <button type="button" class="toggle-pass"
                                onclick="togglePass('confirmPassword', this)">👁️</button>
                    </div>
                    <div class="match-text" id="matchText"></div>
                </div>

                <button type="submit" class="submit-btn">
                    🔐 Reset Password
                </button>

            </form>

            <div class="back-link">
                <a href="login.html">← Back to Login</a>
            </div>

        </div>
    </div>

    <script>
        // Particles
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 40; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                const size = Math.random() * 3 + 1;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.animationDuration = (Math.random() * 15 + 10) + 's';
                p.style.animationDelay = (Math.random() * 15) + 's';
                container.appendChild(p);
            }
        }
        createParticles();

        // Toggle password visibility
        function togglePass(inputId, btn) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = '🙈';
            } else {
                input.type = 'password';
                btn.textContent = '👁️';
            }
        }

        // Password strength
        function checkStrength(password) {
            let strength = 0;
            const fill = document.getElementById('strengthFill');
            const text = document.getElementById('strengthText');

            const ruleLength = document.getElementById('rule-length');
            const ruleUpper = document.getElementById('rule-upper');
            const ruleNumber = document.getElementById('rule-number');

            if (password.length >= 8) {
                strength++;
                ruleLength.className = 'rule valid';
            } else {
                ruleLength.className = 'rule';
            }

            if (/[A-Z]/.test(password)) {
                strength++;
                ruleUpper.className = 'rule valid';
            } else {
                ruleUpper.className = 'rule';
            }

            if (/[0-9]/.test(password)) {
                strength++;
                ruleNumber.className = 'rule valid';
            } else {
                ruleNumber.className = 'rule';
            }

            if (strength === 1) {
                fill.style.width = '33%';
                fill.style.background = '#ff4444';
                text.style.color = '#ff4444';
                text.textContent = 'Weak';
            } else if (strength === 2) {
                fill.style.width = '66%';
                fill.style.background = '#ffaa00';
                text.style.color = '#ffaa00';
                text.textContent = 'Medium';
            } else if (strength === 3) {
                fill.style.width = '100%';
                fill.style.background = '#00c6ff';
                text.style.color = '#00c6ff';
                text.textContent = '✓ Strong';
            } else {
                fill.style.width = '0%';
                text.textContent = '';
            }

            checkMatch();
        }

        // Match check
        function checkMatch() {
            const pass = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;
            const matchText = document.getElementById('matchText');

            if (confirm.length > 0) {
                if (pass === confirm) {
                    matchText.style.color = '#00c6ff';
                    matchText.textContent = '✓ Passwords match!';
                } else {
                    matchText.style.color = '#ff4444';
                    matchText.textContent = '✗ Passwords do not match!';
                }
            } else {
                matchText.textContent = '';
            }
        }
    </script>

</body>
</html>
